<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Routing</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424; --bg4: #2a2a2a;
      --border: #2e2e2e; --border2: #3a3a3a;
      --accent: #3b82f6; --accent2: #1d4ed8; --accent-dim: #1e3a5f;
      --text: #e5e5e5; --text2: #888; --text3: #555;
      --green: #22c55e; --green-dim: #0c2a1a;
      --red: #ef4444; --red-dim: #2a0c0c;
      --orange: #f97316; --orange-dim: #2a1408;
      --yellow: #eab308;
      --radius: 6px; --radius-sm: 4px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'Cascadia Code','Fira Code','Courier New',monospace;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* NAV */
    .nav { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .nav-btn { flex: 1; padding: 9px 2px 7px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text2); font-size: 9px; font-family: var(--font); cursor: pointer; text-transform: uppercase; letter-spacing: .05em; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .nav-btn svg { width: 14px; height: 14px; }
    .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-btn:hover:not(.active) { color: var(--text); }

    /* PANELS */
    .panels { flex: 1; overflow: hidden; position: relative; }
    .panel { position: absolute; inset: 0; overflow-y: auto; display: none; padding: 14px; }
    .panel.active { display: block; }

    /* TYPOGRAPHY */
    .sec-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .sub-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }

    /* FORM */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .field input, .field select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 12px; padding: 7px 9px; outline: none; transition: border-color .15s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text3); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text3); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid #3f1515; }
    .btn-danger:hover { background: var(--red-dim); }
    .btn-sm { padding: 4px 9px; font-size: 11px; }
    .btn-xs { padding: 3px 7px; font-size: 10px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-row { display: flex; gap: 7px; margin-top: 4px; flex-wrap: wrap; }

    /* CARDS */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 7px; }
    .card-title { font-weight: 500; color: var(--text); font-size: 12px; flex: 1; }
    .card-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

    /* BADGE */
    .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .badge-in  { background: var(--green-dim); color: var(--green); }
    .badge-out { background: var(--orange-dim); color: var(--orange); }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ALERTS */
    .alert { padding: 9px 12px; border-radius: var(--radius); font-size: 11px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 7px; }
    .alert-error  { background: var(--red-dim);    color: #fca5a5; border: 1px solid #5c1a1a; }
    .alert-success{ background: var(--green-dim);  color: #86efac; border: 1px solid #1a4a1a; }
    .alert-warn   { background: var(--orange-dim); color: #fcd34d; border: 1px solid #4a3a0a; }
    .alert-info   { background: #0c1a2a;           color: #93c5fd; border: 1px solid #1a3a5a; }

    /* STATUS */
    .status-bar { padding: 6px 14px; background: var(--bg2); border-top: 1px solid var(--border); font-size: 10px; color: var(--text2); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .status-dot.error { background: var(--red); }

    /* DEVICE CARDS */
    .device-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .device-card-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .device-card-header:hover { background: var(--bg3); }
    .device-card-body { border-top: 1px solid var(--border); padding: 12px; display: none; }
    .device-card-body.open { display: block; }
    .chevron { transition: transform .2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(90deg); }
    .io-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .io-field label { display: block; font-size: 10px; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; }
    .io-field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 12px; padding: 5px 8px; text-align: center; }
    .io-summary { display: flex; gap: 6px; flex-wrap: wrap; }
    .io-pill { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; }
    .io-pill-in  { background: var(--green-dim); color: var(--green); }
    .io-pill-out { background: var(--orange-dim); color: var(--orange); }

    /* PORTS */
    .port-row { display: flex; align-items: center; gap: 6px; padding: 0 8px; height: 32px; border-bottom: 1px solid var(--border); font-size: 11px; flex-shrink: 0; }
    .port-row:last-child { border-bottom: none; }
    .port-row:hover { background: var(--bg3); }
    .port-num { font-family: var(--mono); color: var(--text3); width: 28px; flex-shrink: 0; line-height: 1; }
    .port-alias { flex: 1; background: transparent; border: none; color: var(--text); font-size: 11px; font-family: var(--font); padding: 2px 4px; border-radius: 3px; cursor: pointer; height: 24px; }
    .port-alias:hover { background: var(--bg4); }
    .port-alias:focus { background: var(--bg4); outline: 1px solid var(--accent); }
    .port-alias::placeholder { color: var(--text3); font-style: italic; }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; color: var(--text3); pointer-events: none; }
    .search-wrap input { padding-left: 28px; }

    /* =====================================================
       MATRIX — V4
       ===================================================== */
    .matrix-panel { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
    .matrix-panel.active { display: flex; }
    .matrix-toolbar { padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .matrix-toolbar span { font-size: 11px; color: var(--text2); }
    .matrix-scroll { flex: 1; overflow: auto; position: relative; }
    .matrix-table { border-collapse: collapse; font-size: 11px; }
    .matrix-table th, .matrix-table td { border: 1px solid var(--border); }

    /* Corner: sticky top+left */
    .m-corner {
      background: var(--bg);
      position: sticky; top: 0; left: 0;
      z-index: 40;
      min-width: 160px;
      padding: 6px 8px;
    }

    /* Column DEVICE header: sticky top:0, horizontal text, accent border bottom */
    .m-col-dev {
      background: var(--bg2);
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      padding: 5px 4px 4px;
      cursor: pointer; user-select: none;
      position: sticky; top: 0;
      z-index: 21;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      border-bottom: 2px solid var(--accent-dim);
    }
    .m-col-dev:hover { background: var(--bg3); }

    /* Column PORT header: sticky top (second row), rotated CCW */
    .m-col-port {
      background: var(--bg2);
      position: sticky; top: 29px; /* height of device row */
      z-index: 20;
      width: 28px; min-width: 28px;
      height: 90px;
      padding: 4px 2px;
      vertical-align: bottom;
      text-align: center;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 10px; color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row DEVICE cell: sticky left, spans all port rows — always visible */
    .m-row-dev {
      background: var(--bg2);
      position: sticky; left: 0;
      z-index: 10;
      min-width: 150px; max-width: 180px;
      padding: 6px 10px;
      cursor: pointer; user-select: none;
      vertical-align: top;
      border-right: 2px solid var(--border2);
    }
    .m-row-dev:hover { background: var(--bg3); }
    /* Inner label layout */
    .m-row-dev { display: table-cell; } /* keep as table-cell for rowspan */
    .m-row-dev-label { display: inline; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }

    /* Row PORT cell: sticky left, but indented — sits under device name via rowspan */
    .m-row-port {
      background: var(--bg2);
      padding: 3px 8px 3px 14px;
      position: sticky; left: 0;
      z-index: 9;
      min-width: 150px; max-width: 180px;
      font-size: 10px; color: var(--text2);
      white-space: nowrap;
      border-right: 2px solid var(--border2);
    }

    /* Matrix cell */
    .m-cell {
      width: 28px; min-width: 28px; height: 26px;
      text-align: center; vertical-align: middle;
      cursor: pointer; transition: background .1s;
    }
    .m-cell:hover { background: var(--accent-dim) !important; }
    .m-cell.connected { background: var(--green-dim); }
    .m-cell.connected::after { content: '●'; color: var(--green); font-size: 12px; line-height: 26px; }
    .m-cell.same-device { background: #111; cursor: default; }
    .m-cell.same-device:hover { background: #111 !important; }

    /* =====================================================
       CONSOLE — V4
       ===================================================== */
    .console-section-hdr { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); padding: 4px 10px; background: var(--accent-dim); border-left: 2px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

    /* Channel input counter bar */
    .con-input-counter { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px; }

    /* Console table */
    .con-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 360px; }
    .con-table thead tr { background: var(--bg3); }
    .con-table th { padding: 5px 6px; font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); font-weight: 600; text-align: left; border-bottom: 1px solid var(--border2); white-space: nowrap; }
    .con-table tbody tr.con-row { border-bottom: 1px solid var(--border); }
    .con-table tbody tr.con-row:hover { background: var(--bg3); }
    .con-table tbody tr.con-row:last-child { border-bottom: none; }

    .con-num { font-family: var(--mono); color: var(--text3); font-size: 10px; padding: 0 6px; text-align: center; white-space: nowrap; }
    .con-w { padding: 0 4px; text-align: center; }
    .con-name-cell { padding: 3px 4px; min-width: 80px; }
    .con-name-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 11px; font-family: var(--font); padding: 3px 5px; border-radius: 3px; }
    .con-name-input:hover { background: var(--bg4); }
    .con-name-input:focus { background: var(--bg4); outline: 1px solid var(--accent); }
    .con-name-input::placeholder { color: var(--text3); font-style: italic; }
    .con-del-cell { padding: 0 4px; text-align: center; }

    /* V4: Width toggle button (mono / stereo) */
    .width-toggle {
      font-size: 9px; font-weight: 700; font-family: var(--font);
      border-radius: 3px; border: 1px solid; cursor: pointer;
      padding: 2px 5px; letter-spacing: .04em;
      transition: all .15s;
    }
    .width-toggle.mono   { background: #1a1a2e; color: #93c5fd; border-color: #1d3a6e; }
    .width-toggle.mono:hover { background: #1d3a6e; }
    .width-toggle.stereo { background: #1a0a2e; color: #c4b5fd; border-color: #3d1f7a; }
    .width-toggle.stereo:hover { background: #3d1f7a; }

    /* V4: Port assignment button (replaces <select>) */
    .con-port-cell { padding: 3px 4px; min-width: 100px; }
    .con-port-btn {
      width: 100%; min-height: 24px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text2);
      font-size: 10px; font-family: var(--font);
      padding: 3px 6px; cursor: pointer;
      text-align: left; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      transition: border-color .15s, background .15s;
    }
    .con-port-btn:hover { border-color: var(--accent); background: var(--bg4); }
    .con-port-btn.filled { border-color: #1d4a2a; background: #0c1a10; color: var(--text); }
    .con-port-btn.filled:hover { border-color: var(--accent); }

    /* V4: Port picker — full modal dialog (replaces popover) */
    .port-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 800;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .port-modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); box-shadow: 0 16px 48px rgba(0,0,0,.8);
      display: flex; flex-direction: column;
      width: 100%; max-width: 560px;
      max-height: 80vh;
      overflow: hidden;
    }
    .port-modal-header {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .port-modal-header h4 { font-size: 12px; font-weight: 600; }
    .port-modal-body { display: flex; flex: 1; min-height: 0; }
    .port-modal-body.stereo { }
    .pop-side { display: flex; flex-direction: column; flex: 1; min-width: 0; min-height: 0; }
    .pop-side-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); background: var(--accent-dim); padding: 5px 10px; flex-shrink: 0; }
    .pop-divider { width: 1px; background: var(--border2); flex-shrink: 0; }
    .pop-search-wrap { position: relative; padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .pop-search-wrap svg { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; color: var(--text3); pointer-events: none; }
    .pop-search {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 12px; font-family: var(--font);
      padding: 6px 8px 6px 26px; outline: none;
    }
    .pop-search:focus { border-color: var(--accent); }
    .pop-list { overflow-y: auto; flex: 1; }
    .pop-item {
      padding: 7px 12px; cursor: pointer; font-size: 11px;
      color: var(--text2); display: flex; align-items: center; gap: 7px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .pop-item:last-child { border-bottom: none; }
    .pop-item:hover { background: var(--bg3); color: var(--text); }
    .pop-item.selected { background: var(--accent-dim); color: var(--accent); }
    .pop-item.selected:hover { background: var(--accent-dim); }

    /* CONTEXT MENU */
    .ctx-menu { position: fixed; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 4px 0; min-width: 180px; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,.5); font-size: 12px; }
    .ctx-item { padding: 7px 14px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .ctx-item:hover { background: var(--bg3); }
    .ctx-item.danger { color: var(--red); }
    .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
    .ctx-label { padding: 4px 14px 2px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 18px; width: 280px; max-width: 95vw; }
    .modal h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

    /* MISC */
    .empty { text-align: center; padding: 28px 12px; color: var(--text3); font-size: 12px; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wizard-step { text-align: center; padding: 24px 12px; }
    .wizard-step h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .wizard-step p { color: var(--text2); font-size: 12px; line-height: 1.6; margin-bottom: 16px; }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="switchPanel('devices')" id="nav-devices">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Devices
  </button>
